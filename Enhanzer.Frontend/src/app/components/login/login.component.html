<div class="login-container">
  <mat-card class="login-card">
    <div class="company-name-container">
      <h1 class="typing-animation">Enhanzer</h1>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="fill" class="full-width custom-underline">
          <mat-icon matPrefix class="prefix-icon">mail_outline</mat-icon>
          <input type="email" matInput formControlName="email" placeholder="Email*">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email address</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width custom-underline">
          <mat-icon matPrefix class="prefix-icon">vpn_key</mat-icon>
          <input [type]="hidePassword ? 'password' : 'text'" matInput formControlName="password" placeholder="Password*">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button mat-flat-button color="primary" class="login-button full-width" type="submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">LOGIN</span>
          <mat-spinner *ngIf="isLoading" diameter="24"></mat-spinner>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
